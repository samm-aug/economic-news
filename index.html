
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>경제뉴스 피드</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f0f0f; color: #e8e8e8; font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; }
header { position: sticky; top: 0; z-index: 100; background: #0f0f0f; border-bottom: 1px solid #222; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; }
header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
header span { font-size: 12px; color: #666; }
.feed { max-width: 680px; margin: 0 auto; padding: 16px; }
.date-group { margin-bottom: 32px; }
.date-label { font-size: 12px; color: #555; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 12px; padding-left: 4px; }
.card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 20px; margin-bottom: 12px; cursor: pointer; transition: border-color 0.15s; }
.card:hover { border-color: #444; }
.card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
.card-title { font-size: 15px; font-weight: 600; line-height: 1.4; letter-spacing: -0.3px; flex: 1; }
.stars { display: flex; gap: 2px; flex-shrink: 0; margin-top: 2px; font-size: 12px; }
.card-summary { font-size: 13px; color: #999; line-height: 1.6; letter-spacing: -0.2px; margin-bottom: 12px; }
.card-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.tag { font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 500; background: #222; color: #888; }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; overflow-y: auto; padding: 20px; }
.modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }
.modal { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 16px; max-width: 680px; width: 100%; padding: 28px; margin: auto; position: relative; }
.modal-close { position: absolute; top: 20px; right: 20px; background: #2a2a2a; border: none; color: #888; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
.modal-close:hover { color: #fff; }
.modal-date { font-size: 12px; color: #555; margin-bottom: 8px; }
.modal-title { font-size: 20px; font-weight: 700; line-height: 1.4; letter-spacing: -0.5px; margin-bottom: 16px; }
.modal-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
.modal-summary { font-size: 14px; color: #aaa; line-height: 1.7; padding: 16px; background: #111; border-radius: 8px; margin-bottom: 24px; }
.modal-body { font-size: 14px; line-height: 1.8; color: #ccc; letter-spacing: -0.2px; }
.modal-source { margin-top: 24px; padding-top: 16px; border-top: 1px solid #2a2a2a; font-size: 12px; color: #555; }
.modal-source a { color: #5b9bd5; text-decoration: none; }
.loading { text-align: center; padding: 60px 20px; color: #444; font-size: 14px; }
.error { text-align: center; padding: 60px 20px; color: #d55b5b; font-size: 14px; }
.filter-bar { display: flex; gap: 8px; overflow-x: auto; padding: 12px 16px; scrollbar-width: none; }
.filter-bar::-webkit-scrollbar { display: none; }
.filter-btn { flex-shrink: 0; font-size: 12px; padding: 6px 14px; border-radius: 20px; border: 1px solid #2a2a2a; background: transparent; color: #888; cursor: pointer; transition: all 0.15s; }
.filter-btn:hover, .filter-btn.active { background: #e8e8e8; color: #0f0f0f; border-color: #e8e8e8; }
.block-heading { font-size: 15px; font-weight: 700; color: #e8e8e8; margin: 20px 0 8px; }
.block-bullet { font-size: 14px; line-height: 1.8; color: #ccc; padding-left: 4px; margin-bottom: 4px; }
.block-numbered { font-size: 14px; line-height: 1.8; color: #ccc; padding-left: 4px; margin-bottom: 4px; }
.block-para { font-size: 14px; line-height: 1.8; color: #ccc; margin-bottom: 12px; }
.block-gap { height: 8px; }
.block-quote { font-size: 14px; line-height: 1.8; color: #aaa; border-left: 3px solid #444; padding-left: 12px; margin: 8px 0; }
.modal-body a { color: #5b9bd5; text-decoration: none; }
.modal-body code { background: #2a2a2a; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
</style>
</head>
<body>
<header>
  <h1>📈 경제뉴스</h1>
  <span id="count"></span>
</header>
<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" id="btn-전체">전체</button>
</div>
<div class="feed" id="feed">
  <div class="loading">뉴스를 불러오는 중...</div>
</div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal-date" id="modalDate"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-tags" id="modalTags"></div>
    <div class="modal-summary" id="modalSummary"></div>
    <div class="modal-body" id="modalBody"><div class="loading">본문을 불러오는 중...</div></div>
    <div class="modal-source" id="modalSource"></div>
  </div>
</div>
<script>
var DB_ID = '2fa5d658-fe4a-8040-87ae-c4cb9106eca3';
var PROXY = '/api/notion';
var allItems = [];
var newsMap = {};

function fetchDB() {
  return fetch(PROXY + '/databases/' + DB_ID + '/query', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ sorts: [{ property: '날짜', direction: 'descending' }], page_size: 100 })
  }).then(function(r) { return r.json(); }).catch(function() { return null; });
}

function fetchPage(pageId) {
  return fetch(PROXY + '/blocks/' + pageId + '/children', {
    headers: { 'Content-Type': 'application/json' }
  }).then(function(r) { return r.json(); }).catch(function() { return { results: [] }; });
}

function parseItem(page) {
  var props = page.properties;
  return {
    id: page.id,
    title: props['이슈'] && props['이슈'].title && props['이슈'].title[0] ? props['이슈'].title[0].plain_text : '제목 없음',
    date: props['날짜'] && props['날짜'].date ? props['날짜'].date.start : '',
    summary: props['한줄요약'] && props['한줄요약'].rich_text && props['한줄요약'].rich_text[0] ? props['한줄요약'].rich_text[0].plain_text : '',
    stars: props['중요도'] && props['중요도'].select ? props['중요도'].select.name : '',
    tags: props['주제'] && props['주제'].multi_select ? props['주제'].multi_select.map(function(t) { return t.name; }) : [],
    source: props['출처'] && props['출처'].select ? props['출처'].select.name : '',
    url: props['URL'] && props['URL'].url ? props['URL'].url : ''
  };
}

function starsHTML(stars) {
  if (!stars) return '';
  var count = (stars.match(/★/g) || []).length;
  var result = '';
  for (var i = 0; i < Math.min(count, 3); i++) { result += '★'; }
  return result;
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  var d = new Date(dateStr);
  var days = ['일','월','화','수','목','금','토'];
  return d.getFullYear() + '년 ' + (d.getMonth()+1) + '월 ' + d.getDate() + '일 (' + days[d.getDay()] + ')';
}

function groupByDate(items) {
  var groups = {};
  items.forEach(function(item) {
    var d = item.date || '날짜 없음';
    if (!groups[d]) groups[d] = [];
    groups[d].push(item);
  });
  return groups;
}

function renderFeed(items) {
  var feed = document.getElementById('feed');
  if (!items || items.length === 0) {
    feed.innerHTML = '<div class="error">뉴스가 없습니다.</div>';
    return;
  }
  newsMap = {};
  items.forEach(function(item) { newsMap[item.id] = item; });

  var groups = groupByDate(items);
  var dates = Object.keys(groups).sort(function(a,b) { return b < a ? -1 : 1; });
  var html = '';
  dates.forEach(function(date) {
    html += '<div class="date-group">';
    html += '<div class="date-label">' + formatDate(date) + '</div>';
    groups[date].forEach(function(item) {
      html += '<div class="card" data-id="' + item.id + '">';
      html += '<div class="card-top"><div class="card-title">' + item.title + '</div><div class="stars">' + starsHTML(item.stars) + '</div></div>';
      if (item.summary) html += '<div class="card-summary">' + item.summary + '</div>';
      if (item.tags.length) {
        html += '<div class="card-tags">';
        item.tags.forEach(function(t) { html += '<span class="tag">' + t + '</span>'; });
        html += '</div>';
      }
      html += '</div>';
    });
    html += '</div>';
  });
  feed.innerHTML = html;

  document.querySelectorAll('.card').forEach(function(card) {
    card.addEventListener('click', function() {
      var id = card.getAttribute('data-id');
      openModal(id, newsMap[id]);
    });
  });
}

function renderFilters(items) {
  var tags = [];
  items.forEach(function(item) {
    item.tags.forEach(function(t) { if (tags.indexOf(t) === -1) tags.push(t); });
  });
  tags.sort();
  var bar = document.getElementById('filterBar');
  tags.forEach(function(tag) {
    var btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.id = 'btn-' + tag;
    btn.textContent = tag;
    btn.addEventListener('click', function() { filterByTag(tag); });
    bar.appendChild(btn);
  });
}

function filterByTag(tag) {
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  var activeBtn = document.getElementById('btn-' + tag);
  if (activeBtn) activeBtn.classList.add('active');
  var filtered = tag === '전체' ? allItems : allItems.filter(function(i) { return i.tags.indexOf(tag) !== -1; });
  renderFeed(filtered);
}

document.getElementById('btn-전체').addEventListener('click', function() { filterByTag('전체'); });

function blocksToHTML(blocks) {
  var html = '';
  blocks.forEach(function(block) {
    var type = block.type;
    var content = block[type];
    if (!content) return;
    var richText = content.rich_text || [];
    var inner = richText.map(function(t) {
      var text = t.plain_text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      if (t.annotations) {
        if (t.annotations.bold) text = '<b>' + text + '</b>';
        if (t.annotations.italic) text = '<i>' + text + '</i>';
        if (t.annotations.strikethrough) text = '<s>' + text + '</s>';
        if (t.annotations.code) text = '<code>' + text + '</code>';
      }
      if (t.href) text = '<a href="' + t.href + '" target="_blank">' + text + '</a>';
      return text;
    }).join('');

    if (type === 'heading_1' || type === 'heading_2' || type === 'heading_3') {
      html += '<div class="block-heading">' + inner + '</div>';
    } else if (type === 'bulleted_list_item') {
      html += '<div class="block-bullet">• ' + inner + '</div>';
    } else if (type === 'numbered_list_item') {
      html += '<div class="block-numbered">' + inner + '</div>';
    } else if (type === 'paragraph') {
      html += inner ? '<div class="block-para">' + inner + '</div>' : '<div class="block-gap"></div>';
    } else if (type === 'quote') {
      html += '<div class="block-quote">' + inner + '</div>';
    }
  });
  return html;
}

function openModal(pageId, item) {
  var overlay = document.getElementById('modalOverlay');
  overlay.style.display = 'flex';
  document.getElementById('modalDate').textContent = formatDate(item.date);
  document.getElementById('modalTitle').textContent = item.title;
  var tagsHtml = '';
  item.tags.forEach(function(t) { tagsHtml += '<span class="tag">' + t + '</span>'; });
  document.getElementById('modalTags').innerHTML = tagsHtml;
  document.getElementById('modalSummary').textContent = item.summary;
  document.getElementById('modalBody').innerHTML = '<div class="loading">본문을 불러오는 중...</div>';
  document.getElementById('modalSource').innerHTML = item.url ? '출처: <a href="' + item.url + '" target="_blank">' + (item.source || item.url) + '</a>' : '';

  fetchPage(pageId).then(function(data) {
    var blocks = data.results || [];
    var bodyText = blocksToHTML(blocks);
document.getElementById('modalBody').innerHTML = bodyText || '본문이 없습니다.';
  });
}

function closeModal() {
  document.getElementById('modalOverlay').style.display = 'none';
}

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

fetchDB().then(function(data) {
  if (!data || !data.results) {
    document.getElementById('feed').innerHTML = '<div class="error">데이터를 불러오지 못했습니다.</div>';
    return;
  }
  allItems = data.results.map(parseItem);
  document.getElementById('count').textContent = allItems.length + '개';
  renderFilters(allItems);
  renderFeed(allItems);
});
</script>
</body>
</html>
